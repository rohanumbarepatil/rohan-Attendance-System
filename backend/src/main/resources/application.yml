server:
  port: ${PORT:9091}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.format_sql: false
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-64-character-minimum-random-secret-string-for-prod!}
    access-exp-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-exp-days: ${JWT_REFRESH_DAYS:7}
  cors:
    origins: ${FRONTEND_ORIGINS:http://localhost:5173}
  mail-from: ${MAIL_FROM:no-reply@cams.local}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  seed-admin:
    email: ${ADMIN_EMAIL:admin@college.edu}
    password: ${ADMIN_PASSWORD:Admin@123}
    name: ${ADMIN_NAME:System Admin}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
