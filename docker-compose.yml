version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: cams_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cams
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cams_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=cams
      - DB_USER=root
      - DB_PASSWORD=root
      - JWT_SECRET=change-me-to-a-64-character-minimum-random-secret-string-for-prod!
    depends_on:
      - mysql

volumes:
  mysql_data:
